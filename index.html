<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>피로연에 초대합니다</title>
<meta property="og:title" content="피로연에 초대합니다">
<meta property="og:description" content="2026.06.06.(토) 오후 5:30 - 오후 8:00 · 명문웨딩홀">
<meta property="og:type" content="website">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+KR:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#F5F0E8;
  --gold:#C9A96E;
  --gold-light:#D4B896;
  --text:#2C2420;
  --text-light:#6B5E54;
}
body{
  font-family:'Noto Serif KR',serif;
  background:var(--cream);
  color:var(--text);
  max-width:480px;
  margin:0 auto;
  -webkit-font-smoothing:antialiased;
}
.hero{
  min-height:340px;
  padding:64px 28px;
  text-align:center;
  color:white;
  background:linear-gradient(160deg,#8b7a66 0%, #b49974 55%, #c9a96e 100%);
}
.hero .date-en{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:3px;opacity:.9;margin-bottom:16px}
.hero .title{font-size:30px;font-weight:300;line-height:1.5;letter-spacing:2px}
section{padding:54px 30px;text-align:center}
.divider{width:1px;height:40px;background:var(--gold-light);margin:0 auto 24px}
.label{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.copy{font-size:15px;font-weight:200;line-height:2;color:var(--text-light);word-break:keep-all}
.box{background:#FFF8F0;border-radius:10px;padding:20px 16px;margin-top:18px}
.strong{color:var(--text);font-weight:400}
.footer{padding:40px 30px 56px;text-align:center}
.footer .names{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:2px;color:var(--gold);margin-bottom:10px}
.footer .date{font-size:13px;color:var(--text-light);letter-spacing:1px}
</style>
</head>
<body>

<div class="hero">
  <div class="date-en">HOMETOWN RECEPTION</div>
  <div class="title">피로연에<br>초대합니다</div>
</div>

<section>
  <div class="divider"></div>
  <div class="label">초대의 글</div>
  <p class="copy">
    저희 아들의 혼인을 앞두고<br>
    고향에서 먼저 인사를 드리고자
    피로연 자리를 마련했습니다.<br>
    귀한 걸음으로 함께해 주시면 감사하겠습니다.
  </p>
</section>

<section style="background:#FFF8F0;">
  <div class="divider"></div>
  <div class="label">일시</div>
  <div class="box">
    <p class="copy"><span class="strong">2026.06.06.(토)</span></p>
    <p class="copy"><span class="strong">오후 5:30 - 오후 8:00</span></p>
  </div>
</section>

<section>
  <div class="divider"></div>
  <div class="label">장소</div>
  <div class="box">
    <p class="copy"><span class="strong">명문웨딩홀</span></p>
    <p class="copy">충남 보령시 보령북로 236-27</p>
  </div>
</section>

<section style="background:#FFF8F0;">
  <div class="divider"></div>
  <div class="label">마음을 전하는 곳</div>
  <div class="box">
    <p class="copy"><span class="strong">김흥진</span> · 농협은행</p>
    <p class="copy" style="letter-spacing:0.5px;">352-0005-4189-13</p>
    <br>
    <p class="copy"><span class="strong">김순집</span> · 농협은행</p>
    <p class="copy" style="letter-spacing:0.5px;">312-0112-0198-11</p>
  </div>
</section>

<div class="footer">
  <div class="names">예린 & 길한</div>
  <div class="date">감사한 마음으로 기다리겠습니다</div>
</div>

</body>
</html>
